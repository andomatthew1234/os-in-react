<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LushBrowse Demo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #333;
    }
    .hero {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
    }
    h1 { margin-top: 0; color: #007aff; }
    p { color: #666; line-height: 1.5; }
    button {
      background: #007aff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover { background: #005bb5; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Welcome to the Web</h1>
    <p>This is a local HTML file being rendered perfectly inside your React-based macOS Safari clone.</p>
    <button onclick="alert('JavaScript works perfectly in this iframe!')">Test JavaScript</button>
  </div>
</body>
</html>
